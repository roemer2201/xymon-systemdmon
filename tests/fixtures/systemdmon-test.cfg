# Test rule file for tests/run-tests.sh (offline worker tests).
# Exercises: global rules, CLASS/HOST/PAGE scoping and precedence,
# count checks, DEFAULTFAILED, IGNORE, SYSTEMSTATE.

DEFAULTFAILED yellow
SYSTEMSTATE yellow
SVC sshd.service active red
SVC %^getty@tty\d+\.service$ active yellow MIN=1 MAX=1 TEXT="gettys"
IGNORE %^user@\d+\.service$

CLASS=linux
# cron via CLASS is yellow; on web1 the HOST section below must win (red)
SVC cron.service active yellow

PAGE=production
SVC node_exporter.service active yellow

HOST=web1.example.com
SVC nginx.service active red
SVC cron.service active red
