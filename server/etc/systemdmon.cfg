# systemdmon.cfg - rule file for the xymond_systemd channel worker
#
# Location: $XYMONHOME/etc/systemdmon.cfg on the Xymon SERVER.
# All configuration lives here; the clients report all units
# unfiltered. Reload: send SIGHUP to xymond_systemd or just save the
# file (mtime is checked); no restart required.
#
# Syntax (analysis.cfg style, PROC semantics as template):
#
#   Scope lines start a new section. Selectors on one line are ANDed,
#   comma-separated values are ORed. Values may be exact strings or
#   %-prefixed PCRE patterns.
#
#     HOST=hostname[,hostname...]
#     CLASS=classname[,...]        (client class, defaults to the OS name)
#     PAGE=pagepath[,...]          (page from hosts.cfg, "page" or "page/subpage")
#
#   Rules before the first scope line apply to ALL hosts.
#   Precedence per unit: HOST beats CLASS beats PAGE beats global;
#   within the same level the first matching rule in this file wins.
#
#   SVC <unitpattern> [state] [color] [MIN=n] [MAX=n] [TEXT=name]
#
#     unitpattern   full unit name including suffix (sshd.service,
#                   backup.timer, data.mount) or %PCRE
#     state         expected ACTIVE state: active, inactive, failed,
#                   activating, deactivating, reloading, maintenance.
#                   Optionally with SUB state: active/running.
#                   Default: active
#     color         color when the rule is violated: red, yellow or
#                   clear. Default: red
#     MIN=/MAX=     turn the rule into a count check (PROC style):
#                   number of units matching the pattern that are in
#                   the expected state must be >= MIN (default 1)
#                   and <= MAX (default unlimited)
#     TEXT=name     display name in the status message; quote with
#                   double quotes if it contains spaces
#
#   Without MIN/MAX: every unit matching the pattern must be in the
#   expected state, and at least one matching unit must be reported
#   by the client - otherwise the rule fires with <color>.
#
#   DEFAULTFAILED <red|yellow|clear|ignore>
#     Color for failed units that no SVC rule covers.
#     Default: yellow. "ignore" disables the check.
#
#   IGNORE <unitpattern>
#     Exempt units from the DEFAULTFAILED check (still usable in
#     SVC rules).
#
#   SYSTEMSTATE <red|yellow|clear|ignore>
#     Color when "systemctl is-system-running" reports anything other
#     than "running" (typically "degraded"). Default: yellow.
#
# ------------------------------------------------------------------
# Global rules - apply to every host that runs the collector
# ------------------------------------------------------------------

# Failed units without an explicit rule go yellow (built-in default,
# shown here for clarity):
DEFAULTFAILED yellow

# A degraded system state is only worth a yellow by default:
SYSTEMSTATE yellow

# sshd must run everywhere:
SVC sshd.service active red

# Example: user@ service instances of logged-in users may come and
# go and sometimes linger in failed state - do not alert on them:
IGNORE %^user@\d+\.service$

# ------------------------------------------------------------------
# Example: all Debian/Ubuntu clients (CLASS defaults to the OS name)
# ------------------------------------------------------------------
#CLASS=linux
#SVC cron.service active yellow
#SVC apt-daily.timer active yellow

# ------------------------------------------------------------------
# Example: web servers by hostname (PCRE), mail server exact
# ------------------------------------------------------------------
#HOST=%^web[0-9]+\.example\.com$
#SVC nginx.service active red
#SVC php-fpm.service active red TEXT="PHP FastCGI"

#HOST=mail.example.com
#SVC postfix.service active red
#SVC dovecot.service active red
## backup timer must exist and be active; its service unit is covered
## by DEFAULTFAILED if a run fails:
#SVC backup.timer active yellow

# ------------------------------------------------------------------
# Example: count check - exactly one getty on ordinary servers
# ------------------------------------------------------------------
#SVC %^getty@tty\d+\.service$ active yellow MIN=1 MAX=1 TEXT="gettys"

# ------------------------------------------------------------------
# Example: a whole page of the Xymon web tree
# ------------------------------------------------------------------
#PAGE=production
#SVC node_exporter.service active yellow

# ------------------------------------------------------------------
# Example: a unit that must NOT run
# ------------------------------------------------------------------
#HOST=db1.example.com
#SVC telnet.socket inactive red TEXT="telnet must stay off"
