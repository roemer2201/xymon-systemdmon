# tasks.cfg snippet for the xymond_systemd channel worker
# (xymon-systemdmon)
#
# Debian/Ubuntu: drop this file into /etc/xymon/tasks.d/systemdmon.cfg
# (the packaged tasks.cfg includes that directory).
# Other installations: append the block below to $XYMONHOME/etc/tasks.cfg.
# Whether the Rocky/Terabithia RPMs also include a tasks.d/ directory
# is not yet verified - check your tasks.cfg for a "directory" or
# "include" line.
#
# xymonlaunch picks up changes to tasks.cfg automatically.

[systemdmon]
	ENVFILE $XYMONHOME/etc/xymonserver.cfg
	NEEDS xymond
	CMD xymond_channel --channel=client $XYMONHOME/libexec/xymond_systemd --config=$XYMONHOME/etc/systemdmon.cfg
	LOGFILE $XYMONSERVERLOGS/systemdmon.log
