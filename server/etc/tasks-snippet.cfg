# tasks.cfg snippet for the xymond_systemd channel worker
# (xymon-systemdmon)
#
# The stock Xymon 4.3.30 tasks.cfg already contains
# "directory $XYMONHOME/etc/tasks.d" (verified in tasks.cfg.DIST), so
# on any installation whose tasks.cfg is based on the shipped default
# this file just needs to be dropped into that directory:
#   Debian/Ubuntu:  /etc/xymon/tasks.d/systemdmon.cfg
#   FreeBSD port:   /usr/local/www/xymon/server/etc/tasks.d/systemdmon.cfg
# If your tasks.cfg was trimmed and lacks the directory line, append
# the block below to $XYMONHOME/etc/tasks.cfg instead.
#
# xymonlaunch picks up changes to tasks.cfg automatically.

[systemdmon]
	ENVFILE $XYMONHOME/etc/xymonserver.cfg
	NEEDS xymond
	CMD xymond_channel --channel=client $XYMONHOME/libexec/xymond_systemd --config=$XYMONHOME/etc/systemdmon.cfg
	LOGFILE $XYMONSERVERLOGS/systemdmon.log
